<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>租号助手（一键自动填表）</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h2>🚀 数据录入</h2>
        <div style="display: flex; gap: 10px;">
            <button id="stopAutoBtn" onclick="toggleAutoClean()" style="padding: 10px 16px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.3s; box-shadow: 0 2px 8px rgba(40, 167, 69, 0.3);">⏸️ 停止自动清除</button>
            <button onclick="clearAllData()" style="padding: 10px 16px; background: #ff6b6b; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.3s; box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);">🗑️ 一键清空</button>
            <button id="settingsBtn" style="padding: 10px 16px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.3s; box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);">⚙️ 设置</button>
        </div>
    </div>
    
    <div id="settingsModal" style="display:none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h3 style="margin-top: 0;">⚙️ 解析设置</h3>
            <div style="margin-bottom: 15px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="specifyDepositCheck" style="width: 18px; height: 18px; cursor: pointer;">
                    <span>指定押金</span>
                </label>
                <input type="number" id="specifyDepositValue" placeholder="输入押金金额" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-top: 5px; display: none;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="specifyPlayerRatioCheck" style="width: 18px; height: 18px; cursor: pointer;">
                    <span>指定打手比例</span>
                </label>
                <input type="number" id="specifyPlayerRatioValue" placeholder="输入比例（如37）" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-top: 5px; display: none;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="recoveryRentRatioCheck" style="width: 18px; height: 18px; cursor: pointer;">
                    <span>回收租金比例</span>
                </label>
                <input type="number" id="recoveryRentRatioValue" placeholder="输入比例（如35）" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-top: 5px; display: none;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="recoveryRentAmountCheck" style="width: 18px; height: 18px; cursor: pointer;">
                    <span>回收租金金额</span>
                </label>
                <input type="number" id="recoveryRentAmountValue" placeholder="输入金额" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; margin-top: 5px; display: none;">
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="closeSettings()" style="flex: 1; padding: 8px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer;">关闭</button>
                <button onclick="clearSettings()" style="flex: 1; padding: 8px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">清空设置</button>
            </div>
        </div>
    </div>
    
    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <div class="tip" style="flex: 1; margin: 0;">💡 在此处 Ctrl+V 粘贴客户数据内容</div>
        <button onclick="toggleHistory()" style="padding: 8px 16px; background: #17a2b8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;">📜 历史记录</button>
    </div>
    <textarea id="inputText" placeholder="粘贴内容..." autofocus></textarea>
    
    <div class="btn-box">
        <button class="main-btn" onclick="pasteToInput()">📋 粘贴</button>
        <button class="main-btn" onclick="parseAndCopy()" style="margin-left: 10px;">解析数据</button>
    </div>
    
    <div id="profitRateModule" style="display:none; margin-top: 12px; padding: 12px; background: #fff3cd; border-radius: 4px; border-left: 4px solid #ffc107;">
        <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 10px;">
            <div>
                <span style="font-size: 12px; color: #666;">当前利润率档位</span>
                <div style="font-size: 16px; font-weight: 600; color: #333;" id="currentRateDisplay">-</div>
            </div>
            <div>
                <span style="font-size: 12px; color: #666;">稀缺加成</span>
                <div style="font-size: 16px; font-weight: 600; color: #28a745;" id="rarityBonusDisplay">-</div>
            </div>
            <div>
                <span style="font-size: 12px; color: #666;">最终利润率</span>
                <div style="font-size: 16px; font-weight: 600; color: #dc3545;" id="finalRateDisplay">-</div>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; padding-top: 10px; border-top: 1px solid #ffe69c;">
            <span style="font-size: 12px; color: #666;">手动调整:</span>
            <input type="number" id="customProfitRate" style="width: 70px; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px;" min="0" max="100" step="0.1">
            <span style="font-size: 12px; color: #666;">%</span>
            <button class="main-btn" onclick="regenerateWithCustomRate()" style="padding: 6px 16px; font-size: 12px; margin: 0;">重新解析</button>
        </div>
    </div>

    <div id="status">✅ 复制成功！数据已对齐，请去 Excel C 列粘贴。</div>

    <div id="verifyMsg"></div>
    
    <div id="historyModal" style="display:none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 600px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-height: 80vh; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0;">📜 数据录入历史</h3>
                <button onclick="closeHistory()" style="background: none; border: none; font-size: 20px; cursor: pointer;">✕</button>
            </div>
            <input type="text" id="historySearch" placeholder="搜索关键词（纯币、段位、皮肤等）..." style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 10px; box-sizing: border-box;">
            <div id="historyList" style="flex: 1; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; padding: 10px; background: #f9f9f9;"></div>
            <button onclick="clearHistory()" style="margin-top: 10px; padding: 8px 16px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%;">清空历史记录</button>
        </div>
    </div>

    <div class="profit-settings">
        <h3>⚙️ 利率调整</h3>
        <div class="profit-grid">
            <div class="profit-field">
                <label>最低利润(元)</label>
                <input type="number" id="minProfit" value="30" min="0">
            </div>
            <div class="profit-field">
                <label>0~100m</label>
                <div class="input-group">
                    <input type="number" id="tinyRate" value="18" min="0" max="100">
                    <span>%</span>
                </div>
            </div>
            <div class="profit-field">
                <label>101~200m</label>
                <div class="input-group">
                    <input type="number" id="normalRate" value="15" min="0" max="100">
                    <span>%</span>
                </div>
            </div>
            <div class="profit-field">
                <label>201~300m</label>
                <div class="input-group">
                    <input type="number" id="largeRate" value="12" min="0" max="100">
                    <span>%</span>
                </div>
            </div>
            <div class="profit-field">
                <label>301~500m</label>
                <div class="input-group">
                    <input type="number" id="extraLargeRate" value="10" min="0" max="100">
                    <span>%</span>
                </div>
            </div>
            <div class="profit-field">
                <label>>500m</label>
                <div class="input-group">
                    <input type="number" id="hugeRate" value="8" min="0" max="100">
                    <span>%</span>
                </div>
            </div>
        </div>
    </div>

    <div class="profit-settings">
        <h3>🔄 表格数据转标准格式</h3>
        <div class="tip">💡 粘贴表格行数据（Tab分隔），自动转换为标准格式</div>
        <textarea id="tableInput" placeholder="粘贴表格数据..." style="min-height: 80px;"></textarea>
        <div class="btn-box">
            <button class="main-btn" onclick="convertTableToStandard()">转换为标准格式</button>
            <button class="main-btn" onclick="convertTableToSimple()" style="margin-left: 10px;">转换为简单数据</button>
        </div>
        <div id="convertStatus" style="display:none; margin-top: 10px; padding: 10px; background: #d4edda; color: #155724; border-radius: 4px;">
            ✅ 转换成功！
        </div>
        <div style="margin-top: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <h4 style="margin: 0;">转换结果预览：</h4>
                <button onclick="copyConvertResult()" style="padding: 6px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;">📋 一键复制</button>
            </div>
            <pre id="convertPreview" style="background: #f8f9fa; padding: 12px; border-radius: 4px; white-space: pre-wrap; word-wrap: break-word; max-height: 400px; overflow-y: auto; font-size: 13px; line-height: 1.6;"></pre>
        </div>
    </div>
</div>

<script src="price-config.js"></script>
<script src="config.js"></script>
<script>
let clearTimer = null;
let inputModified = false;
let lastParsedData = null;
let lastVerifyData = null;
let settingsTimer = null;
let autoClearEnabled = true;
let history = JSON.parse(localStorage.getItem('inputHistory')) || [];
let parseSettings = {
    specifyDeposit: false,
    specifyDepositValue: 0,
    specifyPlayerRatio: false,
    specifyPlayerRatioValue: 0,
    recoveryRentRatio: false,
    recoveryRentRatioValue: 0,
    recoveryRentAmount: false,
    recoveryRentAmountValue: 0
};

function toggleAutoClean() {
    autoClearEnabled = !autoClearEnabled;
    const btn = document.getElementById('stopAutoBtn');
    if (autoClearEnabled) {
        btn.textContent = '⏸️ 停止自动清除';
        btn.style.background = '#28a745';
        btn.style.boxShadow = '0 2px 8px rgba(40, 167, 69, 0.3)';
    } else {
        btn.textContent = '▶️ 恢复自动清除';
        btn.style.background = '#ffc107';
        btn.style.boxShadow = '0 2px 8px rgba(255, 193, 7, 0.3)';
    }
}

function openSettings() {
    if (clearTimer) clearTimeout(clearTimer);
    document.getElementById('specifyDepositCheck').checked = parseSettings.specifyDeposit;
    document.getElementById('specifyDepositValue').value = parseSettings.specifyDepositValue || '';
    document.getElementById('specifyPlayerRatioCheck').checked = parseSettings.specifyPlayerRatio;
    document.getElementById('specifyPlayerRatioValue').value = parseSettings.specifyPlayerRatioValue || '';
    document.getElementById('recoveryRentRatioCheck').checked = parseSettings.recoveryRentRatio;
    document.getElementById('recoveryRentRatioValue').value = parseSettings.recoveryRentRatioValue || '';
    document.getElementById('recoveryRentAmountCheck').checked = parseSettings.recoveryRentAmount;
    document.getElementById('recoveryRentAmountValue').value = parseSettings.recoveryRentAmountValue || '';
    updateSettingsUI();
    const modal = document.getElementById('settingsModal');
    modal.style.display = 'flex';
}

function closeSettings() {
    saveSettings();
    document.getElementById('settingsModal').style.display = 'none';
    resetSettingsAfterDelay();
}

function clearSettings() {
    document.getElementById('specifyDepositCheck').checked = false;
    document.getElementById('specifyDepositValue').value = '';
    document.getElementById('specifyPlayerRatioCheck').checked = false;
    document.getElementById('specifyPlayerRatioValue').value = '';
    document.getElementById('recoveryRentRatioCheck').checked = false;
    document.getElementById('recoveryRentRatioValue').value = '';
    document.getElementById('recoveryRentAmountCheck').checked = false;
    document.getElementById('recoveryRentAmountValue').value = '';
    parseSettings = {
        specifyDeposit: false, specifyDepositValue: 0,
        specifyPlayerRatio: false, specifyPlayerRatioValue: 0,
        recoveryRentRatio: false, recoveryRentRatioValue: 0,
        recoveryRentAmount: false, recoveryRentAmountValue: 0
    };
    updateSettingsUI();
}

function saveSettings() {
    parseSettings.specifyDeposit = document.getElementById('specifyDepositCheck').checked;
    parseSettings.specifyDepositValue = parseFloat(document.getElementById('specifyDepositValue').value) || 0;
    parseSettings.specifyPlayerRatio = document.getElementById('specifyPlayerRatioCheck').checked;
    parseSettings.specifyPlayerRatioValue = parseFloat(document.getElementById('specifyPlayerRatioValue').value) || 0;
    parseSettings.recoveryRentRatio = document.getElementById('recoveryRentRatioCheck').checked;
    parseSettings.recoveryRentRatioValue = parseFloat(document.getElementById('recoveryRentRatioValue').value) || 0;
    parseSettings.recoveryRentAmount = document.getElementById('recoveryRentAmountCheck').checked;
    parseSettings.recoveryRentAmountValue = parseFloat(document.getElementById('recoveryRentAmountValue').value) || 0;
}

function updateSettingsUI() {
    document.getElementById('specifyDepositValue').style.display = document.getElementById('specifyDepositCheck').checked ? 'block' : 'none';
    document.getElementById('specifyPlayerRatioValue').style.display = document.getElementById('specifyPlayerRatioCheck').checked ? 'block' : 'none';
    document.getElementById('recoveryRentRatioValue').style.display = document.getElementById('recoveryRentRatioCheck').checked ? 'block' : 'none';
    document.getElementById('recoveryRentAmountValue').style.display = document.getElementById('recoveryRentAmountCheck').checked ? 'block' : 'none';
}

function clearAllData() {
    document.getElementById('inputText').value = '';
    document.getElementById('verifyMsg').style.display = 'none';
    document.getElementById('profitRateModule').style.display = 'none';
    clearSettings();
    closeSettings();
}

function resetSettingsAfterDelay() {
    if (settingsTimer) clearTimeout(settingsTimer);
    if (document.getElementById('settingsModal').style.display === 'flex') return;
    settingsTimer = setTimeout(() => {
        if (document.getElementById('settingsModal').style.display !== 'flex') {
            clearSettings();
        }
    }, 5000);
}

document.getElementById('settingsBtn').addEventListener('click', openSettings);
document.getElementById('settingsModal').addEventListener('click', function(e) {
    if (e.target === this) closeSettings();
});
document.getElementById('specifyDepositCheck').addEventListener('change', updateSettingsUI);
document.getElementById('specifyPlayerRatioCheck').addEventListener('change', updateSettingsUI);
document.getElementById('recoveryRentRatioCheck').addEventListener('change', function() {
    if (this.checked) document.getElementById('recoveryRentAmountCheck').checked = false;
    updateSettingsUI();
});
document.getElementById('recoveryRentAmountCheck').addEventListener('change', function() {
    if (this.checked) document.getElementById('recoveryRentRatioCheck').checked = false;
    updateSettingsUI();
});

function analyzeAccountValue(data) {
     let rarity = 0;
     const knifeSkins = data['刀皮'] ? data['刀皮'].split(/[、,，]/).filter(s => s && s !== '无') : [];
     const redSkins = data['红皮'] ? data['红皮'].split(/[、,，]/).filter(s => s && s !== '无') : [];
     
     if (knifeSkins.length > 0) rarity += 0.8;
     if (redSkins.length > 0) rarity += 0.6;
     
     const insurance = parseInt(data['保险']) || 0;
     const stamina = parseInt(data['体力']) || 0;
     const weight = parseInt(data['负重']) || 0;
     const pureCoins = typeof data['纯币'] === 'number' ? data['纯币'] : (parseFloat(data['纯币']?.replace?.(/[mMb]/gi, '')) || 0);
     
     if (insurance === 9 && stamina === 7 && weight === 7) rarity += 2;
     else if (insurance === 9 && (stamina === 7 || weight === 7)) rarity += 1;
     else if (insurance === 6 && stamina >= 6 && weight >= 6) rarity -= 1;
     
     const hotKnifeSkins = ['赤枭', '怜悯', '北极星', '暗星'];
     const hotRedSkins = ['凌霄戍卫'];
     const hasHotKnife = knifeSkins.some(s => hotKnifeSkins.some(h => s.includes(h)));
     const hasHotRed = redSkins.some(s => hotRedSkins.some(h => s.includes(h)));
     
     if ((hasHotKnife || hasHotRed) && insurance === 9 && stamina >= 6 && weight >= 6 && pureCoins >= 20 && pureCoins <= 200) {
         rarity += 8;
     }
     
     if (pureCoins > 200 && !hasHotKnife && !hasHotRed && insurance !== 9) {
         rarity -= 2;
     }
     
     return Math.max(Math.min(rarity, 10), 0);
}

async function pasteToInput() {
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById('inputText').value = text;
        document.getElementById('inputText').dispatchEvent(new Event('paste', { bubbles: true }));
    } catch (err) {
        console.log('粘贴失败');
    }
}

async function parseAndCopy() {
    const PROFIT_CONFIG = {
        minProfit: parseFloat(document.getElementById('minProfit').value) || 20,
        tinyRate: (parseFloat(document.getElementById('tinyRate').value) || 18) / 100,
        normalRate: (parseFloat(document.getElementById('normalRate').value) || 15) / 100,
        largeRate: (parseFloat(document.getElementById('largeRate').value) || 12) / 100,
        extraLargeRate: (parseFloat(document.getElementById('extraLargeRate').value) || 10) / 100,
        hugeRate: (parseFloat(document.getElementById('hugeRate').value) || 8) / 100
    };
    
    const inputBox = document.getElementById('inputText');
    const text = inputBox.value;
    
    if (!text.trim()) { alert("内容为空！"); return; }

    const data = {};
    const patterns = {
        '纯币': /哈夫币纯币:\s*([\d\.]+[mM]?)/,
        '段位': /段位:\s*([^\n]+)/,
        'KD': /绝密KD:\s*([\d\.]+)/,
        '等级': /等级:\s*(\d+)/,
        '保险': /保险格数:\s*(\d+)/,
        '体验卡': /9格保险体验卡:\s*(\d+)/,
        '体力': /体力:\s*(\d+)/,
        '负重': /负重:\s*(\d+)/,
        'AW': /AWM子弹数量:\s*(\d+)/,
        '六头': /6头数量:\s*(\d+)/,
        '六甲': /6甲数量:\s*(\d+)/,
        '刀皮': /刀皮:\s*(.*?)(?:\n|$)/,
        '红皮': /干员红皮:\s*(.*?)(?:\n|$)/,
        '金皮': /干员金皮:\s*(.*?)(?:\n|$)/,
        '武器皮肤': /武器皮肤:\s*(.*?)(?:\n|$)/,
        '上号方式': /上号方式:\s*(.*?)(?:\n|$)/,
        '联系号码': /联系号码:\s*(\d+)(?:[^\d]*?\(([^)]+)\))?/,
        '在线时间': /在线时间:\s*(.*?)(?:\n|$)/,
        '租金': /回收(?:纯币)?租金:\s*([\d\.]+)/,
        '押金': /押金:\s*([\d\.]+)/
    };

    for (let key in patterns) {
        const match = text.match(patterns[key]);
        data[key] = (match && match[1]) ? match[1].trim() : "";
    }
    
    const fieldsToFillZero = ['AW', '六头', '六甲', 'KD'];
    fieldsToFillZero.forEach(field => {
        if (!data[field] || data[field] === "") {
            data[field] = "0";
        }
    });

    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const date = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const timeStr = `${year}-${month}-${date} ${hours}:${minutes}`;

    let finalIns = data['保险'] || "";
    const cardCount = parseInt(data['体验卡']) || 0;
    if (cardCount > 0) {
        finalIns = `${finalIns} (9格体验卡${cardCount}天)`;
    }

    const skinList = [data['刀皮'], data['红皮'], data['金皮'], data['武器皮肤']].filter(s => s && s !== '无');
    let skinStr = skinList.join(' / ') || '无';

    let login = 'vx扫码';
    const loginMethod = data['上号方式'];
    if (loginMethod.includes('QQ扫码')) login = 'qq扫码';
    else if (loginMethod.includes('QQ账号密码')) login = 'qq账密';
    else if (loginMethod.includes('VX扫码')) login = 'vx扫码';

    const pureCoins = parseFloat(data['纯币'].replace(/[Mmb]/gi, '')) || 0;
    const recoveryRent = parseFloat(data['租金']) || 1;
    
    let targetProfitRate = PROFIT_CONFIG.tinyRate;
    if (pureCoins > 500) {
        const excess = pureCoins - 500;
        const reductions = Math.floor(excess / 200);
        targetProfitRate = (PROFIT_CONFIG.hugeRate * 100 - reductions) / 100;
        targetProfitRate = Math.max(targetProfitRate, 0.05);
    } else if (pureCoins > 300) {
        targetProfitRate = PROFIT_CONFIG.extraLargeRate;
    } else if (pureCoins > 200) {
        targetProfitRate = PROFIT_CONFIG.largeRate;
    } else if (pureCoins > 100) {
        targetProfitRate = PROFIT_CONFIG.normalRate;
    }
    
    const rarityBonus = analyzeAccountValue({...data, '纯币': pureCoins});
    const baseRate = targetProfitRate * 100;
    const bonusRate = rarityBonus;
    const finalRate = (baseRate + bonusRate) / 100;
    
    lastParsedData = {
        data, PROFIT_CONFIG, recoveryRent, finalRate, baseRate, bonusRate, pureCoins,
        finalIns, skinStr, login, timeStr, now
    };
    
    resetSettingsAfterDelay();
    performParse(finalRate, recoveryRent, data, PROFIT_CONFIG, pureCoins, finalIns, skinStr, login, timeStr);
}

function performParse(finalRate, recoveryRent, data, PROFIT_CONFIG, pureCoins, finalIns, skinStr, login, timeStr) {
     let playerRatio, playerRent, ownerRatio, profit, deposit;
     
     if (parseSettings.specifyPlayerRatio && parseSettings.specifyPlayerRatioValue > 0) {
         playerRatio = parseSettings.specifyPlayerRatioValue;
         playerRent = Math.ceil(pureCoins * 100 / playerRatio);
         if (parseSettings.recoveryRentAmount && parseSettings.recoveryRentAmountValue > 0) {
             recoveryRent = parseSettings.recoveryRentAmountValue;
             ownerRatio = Math.floor(pureCoins * 100 / recoveryRent);
         } else if (parseSettings.recoveryRentRatio && parseSettings.recoveryRentRatioValue > 0) {
             recoveryRent = Math.floor(pureCoins * 100 / parseSettings.recoveryRentRatioValue);
             ownerRatio = parseSettings.recoveryRentRatioValue;
         } else {
             ownerRatio = Math.floor(pureCoins * 100 / recoveryRent);
         }
         profit = playerRent - recoveryRent;
     } else if (parseSettings.recoveryRentAmount && parseSettings.recoveryRentAmountValue > 0) {
         recoveryRent = parseSettings.recoveryRentAmountValue;
         let handlerRent = Math.round(recoveryRent / (1 - finalRate));
         profit = handlerRent - recoveryRent;
         if (profit < PROFIT_CONFIG.minProfit) {
             profit = PROFIT_CONFIG.minProfit;
             handlerRent = recoveryRent + profit;
         }
         playerRent = handlerRent;
         playerRatio = Math.ceil(pureCoins * 100 / playerRent);
         playerRent = Math.ceil(pureCoins * 100 / (playerRatio - 0.9));
         ownerRatio = Math.floor(pureCoins * 100 / recoveryRent);
     } else if (parseSettings.recoveryRentRatio && parseSettings.recoveryRentRatioValue > 0) {
         recoveryRent = Math.floor(pureCoins * 100 / parseSettings.recoveryRentRatioValue);
         let handlerRent = Math.round(recoveryRent / (1 - finalRate));
         profit = handlerRent - recoveryRent;
         if (profit < PROFIT_CONFIG.minProfit) {
             profit = PROFIT_CONFIG.minProfit;
             handlerRent = recoveryRent + profit;
         }
         playerRent = handlerRent;
         playerRatio = Math.ceil(pureCoins * 100 / playerRent);
         playerRent = Math.ceil(pureCoins * 100 / (playerRatio - 0.9));
         ownerRatio = parseSettings.recoveryRentRatioValue;
     } else {
         let handlerRent = Math.round(recoveryRent / (1 - finalRate));
         profit = handlerRent - recoveryRent;
         if (profit < PROFIT_CONFIG.minProfit) {
             profit = PROFIT_CONFIG.minProfit;
             handlerRent = recoveryRent + profit;
         }
         playerRent = handlerRent;
         playerRatio = Math.ceil(pureCoins * 100 / playerRent);
         playerRent = Math.ceil(pureCoins * 100 / (playerRatio - 0.9));
         ownerRatio = Math.floor(pureCoins * 100 / recoveryRent);
     }
    
    profit = playerRent - recoveryRent;
    deposit = parseSettings.specifyDeposit ? parseSettings.specifyDepositValue : (parseFloat(data['押金']) || 80);

function saveToHistory(text) {
    const entry = {
        time: new Date().toLocaleString('zh-CN'),
        content: text.substring(0, 200)
    };
    history.unshift(entry);
    if (history.length > 50) history.pop();
    localStorage.setItem('inputHistory', JSON.stringify(history));
}

function toggleHistory() {
    document.getElementById('historyModal').style.display = document.getElementById('historyModal').style.display === 'none' ? 'flex' : 'none';
    renderHistory(history);
}

function closeHistory() {
    document.getElementById('historyModal').style.display = 'none';
}

function renderHistory(items) {
    const list = document.getElementById('historyList');
    list.innerHTML = items.length === 0 ? '<div style="text-align: center; color: #999; padding: 20px;">暂无历史记录</div>' :
        items.map((item, idx) => `<div style="padding: 10px; border-bottom: 1px solid #ddd; cursor: pointer; hover: background: #f0f0f0;" onclick="loadHistory(${idx})">
            <div style="font-size: 12px; color: #999;">${item.time}</div>
            <div style="font-size: 13px; color: #333; margin-top: 5px;">${item.content}...</div>
        </div>`).join('');
}

function loadHistory(idx) {
    document.getElementById('inputText').value = history[idx].content;
    closeHistory();
}

function clearHistory() {
    if (confirm('确定要清空所有历史记录吗？')) {
        history = [];
        localStorage.removeItem('inputHistory');
        renderHistory([]);
    }
}

document.getElementById('historySearch').addEventListener('input', function() {
    const keyword = this.value.toLowerCase();
    const filtered = history.filter(item => item.content.toLowerCase().includes(keyword));
    renderHistory(filtered);
});
</script>
</body>
</html>
