<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>租号助手（一键自动填表）</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h2>🚀 数据录入</h2>
    </div>
    
    <div class="tip">💡 在此处 Ctrl+V 粘贴客户数据内容</div>
    <textarea id="inputText" placeholder="粘贴内容..." autofocus></textarea>
    
    <div class="btn-box">
        <button class="main-btn" onclick="parseAndCopy()">解析数据</button>
    </div>

    <div id="status">✅ 复制成功！数据已对齐，请去 Excel C 列粘贴。</div>

    <div class="verify-section">
        <h3>🔍 快速验证</h3>
        <div class="verify-box-container">
            <input type="text" id="verifyBox" placeholder="📋" readonly>
            <p>在此框粘贴客户数据验证价格</p>
            <div id="verifyMsg"></div>
        </div>
    </div>

    <div class="profit-settings">
        <h3>⚙️ 利率调整</h3>
        <div class="profit-grid">
            <div class="profit-field">
                <label>最低利润(元)</label>
                <input type="number" id="minProfit" value="30" min="0">
            </div>
            <div class="profit-field">
                <label>0~100m</label>
                <div class="input-group">
                    <input type="number" id="tinyRate" value="18" min="0" max="100">
                    <span>%</span>
                </div>
            </div>
            <div class="profit-field">
                <label>101~200m</label>
                <div class="input-group">
                    <input type="number" id="normalRate" value="15" min="0" max="100">
                    <span>%</span>
                </div>
            </div>
            <div class="profit-field">
                <label>201~300m</label>
                <div class="input-group">
                    <input type="number" id="largeRate" value="12" min="0" max="100">
                    <span>%</span>
                </div>
            </div>
            <div class="profit-field">
                <label>301~500m</label>
                <div class="input-group">
                    <input type="number" id="extraLargeRate" value="10" min="0" max="100">
                    <span>%</span>
                </div>
            </div>
            <div class="profit-field">
                <label>>500m</label>
                <div class="input-group">
                    <input type="number" id="hugeRate" value="8" min="0" max="100">
                    <span>%</span>
                </div>
            </div>
        </div>
    </div>

    <div class="profit-settings">
        <h3>🔄 表格数据转标准格式</h3>
        <div class="tip">💡 粘贴表格行数据（Tab分隔），自动转换为标准格式</div>
        <textarea id="tableInput" placeholder="粘贴表格数据..." style="min-height: 80px;"></textarea>
        <div class="btn-box">
            <button class="main-btn" onclick="convertTableToStandard()">转换为标准格式</button>
            <button class="main-btn" onclick="convertTableToSimple()" style="margin-left: 10px;">转换为简单数据</button>
        </div>
        <div id="convertStatus" style="display:none; margin-top: 10px; padding: 10px; background: #d4edda; color: #155724; border-radius: 4px;">
            ✅ 转换成功！
        </div>
        <div style="margin-top: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <h4 style="margin: 0;">转换结果预览：</h4>
                <button onclick="copyConvertResult()" style="padding: 6px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;">📋 一键复制</button>
            </div>
            <pre id="convertPreview" style="background: #f8f9fa; padding: 12px; border-radius: 4px; white-space: pre-wrap; word-wrap: break-word; max-height: 400px; overflow-y: auto; font-size: 13px; line-height: 1.6;"></pre>
        </div>
    </div>
</div>

<script src="price-config.js"></script>
<script src="config.js"></script>
<script>
async function parseAndCopy() {
    const PROFIT_CONFIG = {
        minProfit: parseFloat(document.getElementById('minProfit').value) || 20,
        tinyRate: (parseFloat(document.getElementById('tinyRate').value) || 18) / 100,
        normalRate: (parseFloat(document.getElementById('normalRate').value) || 15) / 100,
        largeRate: (parseFloat(document.getElementById('largeRate').value) || 12) / 100,
        extraLargeRate: (parseFloat(document.getElementById('extraLargeRate').value) || 10) / 100,
        hugeRate: (parseFloat(document.getElementById('hugeRate').value) || 8) / 100
    };
    
    const inputBox = document.getElementById('inputText');
    const text = inputBox.value;
    
    if (!text.trim()) { alert("内容为空！"); return; }

    const data = {};
    const patterns = {
        '纯币': /哈夫币纯币:\s*([\d\.]+[mM]?)/,
        '段位': /段位:\s*([^\n]+)/,
        'KD': /绝密KD:\s*([\d\.]+)/,
        '等级': /等级:\s*(\d+)/,
        '保险': /保险格数:\s*(\d+)/,
        '体验卡': /9格保险体验卡:\s*(\d+)/,
        '体力': /体力:\s*(\d+)/,
        '负重': /负重:\s*(\d+)/,
        'AW': /AWM子弹数量:\s*(\d+)/,
        '六头': /6头数量:\s*(\d+)/,
        '六甲': /6甲数量:\s*(\d+)/,
        '刀皮': /刀皮:\s*(.*?)(?:\n|$)/,
        '红皮': /干员红皮:\s*(.*?)(?:\n|$)/,
        '金皮': /干员金皮:\s*(.*?)(?:\n|$)/,
        '武器皮肤': /武器皮肤:\s*(.*?)(?:\n|$)/,
        '上号方式': /上号方式:\s*(.*?)(?:\n|$)/,
        '联系号码': /联系号码:\s*([^\n]+)/,
        '租金': /回收租金:\s*([\d\.]+)/,
        '押金': /押金:\s*([\d\.]+)/
    };

    for (let key in patterns) {
        const match = text.match(patterns[key]);
        data[key] = (match && match[1]) ? match[1].trim() : "";
    }
    
    const fieldsToFillZero = ['AW', '六头', '六甲', 'KD'];
    fieldsToFillZero.forEach(field => {
        if (!data[field] || data[field] === "") {
            data[field] = "0";
        }
    });

    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const date = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const timeStr = `${year}-${month}-${date} ${hours}:${minutes}`;

    let finalIns = data['保险'] || "";
    const cardCount = parseInt(data['体验卡']) || 0;
    if (cardCount > 0) {
        finalIns = `${finalIns} (9格体验卡${cardCount}天)`;
    }

    const skinList = [data['刀皮'], data['红皮'], data['金皮'], data['武器皮肤']].filter(s => s && s !== '无');
    let skinStr = skinList.join(' / ') || '无';

    let login = 'vx扫码';
    const loginMethod = data['上号方式'];
    if (loginMethod.includes('QQ扫码')) login = 'qq扫码';
    else if (loginMethod.includes('QQ账号密码')) login = 'qq账密';
    else if (loginMethod.includes('VX扫码')) login = 'vx扫码';

    const pureCoins = parseFloat(data['纯币'].replace(/[Mmb]/gi, '')) || 0;
    const recoveryRent = parseFloat(data['租金']) || 1;
    
    let targetProfitRate = PROFIT_CONFIG.tinyRate;
    if (pureCoins > 500) {
        const excess = pureCoins - 500;
        const reductions = Math.floor(excess / 200);
        targetProfitRate = (PROFIT_CONFIG.hugeRate * 100 - reductions) / 100;
        targetProfitRate = Math.max(targetProfitRate, 0.05);
    } else if (pureCoins > 300) {
        targetProfitRate = PROFIT_CONFIG.extraLargeRate;
    } else if (pureCoins > 200) {
        targetProfitRate = PROFIT_CONFIG.largeRate;
    } else if (pureCoins > 100) {
        targetProfitRate = PROFIT_CONFIG.normalRate;
    }
    
    let handlerRent = Math.round(recoveryRent / (1 - targetProfitRate));
    let profit = handlerRent - recoveryRent;
    if (profit < PROFIT_CONFIG.minProfit) {
        profit = PROFIT_CONFIG.minProfit;
        handlerRent = recoveryRent + profit;
    }
    
    let playerRent = handlerRent;
    let playerRatio = Math.ceil(pureCoins * 100 / playerRent);
    let ownerRatio = Math.floor(pureCoins * 100 / recoveryRent);

    let suggestedDeposit = 80;
    if (recoveryRent && recoveryRent > 0) {
        suggestedDeposit = Math.ceil(recoveryRent * 0.5);
    }

    const totalAmount = playerRent + parseFloat(data['押金']) || 0;
    const rowArray = [
        data['纯币'].replace(/M/g, 'm').replace(/b/gi, 'm'),
        data['段位'],
        data['KD'],
        data['等级'],
        finalIns,
        data['体力'],
        data['负重'],
        data['AW'],
        data['六头'],
        data['六甲'],
        skinStr,
        login,
        playerRatio,
        playerRent,
        data['押金'],
        totalAmount,
        ownerRatio,
        data['租金'],
        profit,
        timeStr,
        data['联系号码']
    ];

    const finalString = rowArray.join('\t');
    await navigator.clipboard.writeText(finalString);
    document.getElementById('status').style.display = 'block';
    setTimeout(() => { document.getElementById('status').style.display = 'none'; }, 3000);
}


document.getElementById("verifyBox").addEventListener("paste", function(e) {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData("text");
    const box = document.getElementById("verifyBox");
    const msgBox = document.getElementById("verifyMsg");
    const errors = [];
    
    const fieldMap = {
       '哈夫币纯币': 'hafuCoin',
       '哈夫币': 'hafuCoin',
       '等级': 'level',
       '保险格数': 'insurance',
       '保险': 'insurance',
       '体力': 'stamina',
       '负重': 'weight',
       '9格保险体验卡': 'insuranceCards',
       '体验卡': 'insuranceCards',
       '刀皮': 'knifeSkins',
       '干员红皮': 'operatorRedSkins',
       '武器皮肤': 'weaponSkins',
       '回收租金': 'customerPrice'
    };
    
    const data = {};
    const lines = text.split('\n');
    lines.forEach(line => {
       line = line.trim();
       if (!line) return;
       const colonIdx = Math.min(
           line.indexOf(':') !== -1 ? line.indexOf(':') : Infinity,
           line.indexOf('：') !== -1 ? line.indexOf('：') : Infinity
       );
       if (colonIdx === Infinity) return;
       const field = line.substring(0, colonIdx).trim();
       let value = line.substring(colonIdx + 1).trim();
       if (!value || value === '无' || value === '-') return;
       
       const key = fieldMap[field];
       if (!key) return;
       
       if (key === 'customerPrice') {
          data[key] = parseFloat(value.replace(/[^\d.]/g, ''));
       } else if (key === 'knifeSkins' || key === 'weaponSkins' || key === 'operatorRedSkins') {
          data[key] = value.split(/[、,，]/).map(s => s.trim()).filter(s => s && s !== '无');
       } else if (key === 'hafuCoin') {
          data[key] = parseFloat(value.replace(/[mM]/g, ''));
       } else {
          data[key] = parseInt(value.replace(/[^\d]/g, '')) || 0;
       }
    });
    
    const customerPrice = data.customerPrice || 0;
    const hafuCoin = data.hafuCoin || 0;
    const level = data.level || 0;
    const insurance = data.insurance || 2;
    const stamina = data.stamina || 1;
    const weight = data.weight || 1;
    const insuranceCards = data.insuranceCards || 0;
    const knifeSkins = data.knifeSkins || [];
    const operatorRedSkins = data.operatorRedSkins || [];
    const weaponSkins = data.weaponSkins || [];
    
    if (!hafuCoin) errors.push("缺少数据：哈夫币纯币");
    if (!level) errors.push("缺少数据：等级");
    if (!customerPrice) errors.push("缺少数据：回收租金");
    
    const params = {
       hafu_coin: hafuCoin,
       level: level,
       insurance: insurance,
       stamina: stamina,
       weight: weight,
       knife_skins: knifeSkins,
       operator_red_skins: operatorRedSkins,
       weapon_skins: weaponSkins,
       insurance_cards: insuranceCards
    };
    const ourPrice = calcRentPrice(CFG, params);
    const priceDiff = Math.abs(customerPrice - ourPrice);
    const recoveryRatio = customerPrice > 0 ? (hafuCoin * 100 / customerPrice).toFixed(1) : '0.0';
    const analysis = analyzeRatio(CFG, params);
    const detailsHtml = `<div style="margin-top:10px;padding:12px;background:#f8f9fa;border-radius:6px;font-size:12px;text-align:left;line-height:1.8;border-left:3px solid #007bff;">
      <div style="margin-bottom:8px;font-weight:600;color:#333;">${analysis.summary}</div>
      <div style="border-top:1px solid #dee2e6;padding-top:8px;margin-top:8px;">
        ${analysis.changes.join('<br>')}
      </div>
    </div>`;
    
    if (errors.length > 0) {
       box.value = "❌";
       box.style.color = "#dc3545";
       msgBox.innerHTML = "❌ " + errors.map(e => `<b>${e}</b>`).join("<br>");
       msgBox.style.display = "block";
       setTimeout(() => { box.value = "📋"; box.style.color = "inherit"; msgBox.style.display = "none"; }, 10000);
    } else if (priceDiff < 1.5) {
       box.value = "✅";
       box.style.color = "#28a745";
       msgBox.innerHTML = `✅ <b>验证通过</b><br>回收比例: ${recoveryRatio}${detailsHtml}`;
       msgBox.style.display = "block";
       document.getElementById("inputText").value = "";
       setTimeout(() => { box.value = "📋"; box.style.color = "inherit"; msgBox.style.display = "none"; }, 15000);
    } else {
       box.value = "❌";
       box.style.color = "#dc3545";
       msgBox.innerHTML = `❌ <b>价格不对</b><br>客户报价: ${customerPrice}元<br>系统计算: ${ourPrice}元<br>差异: ${priceDiff.toFixed(1)}元<br>回收比例: ${recoveryRatio}${detailsHtml}`;
       msgBox.style.display = "block";
       setTimeout(() => { box.value = "📋"; box.style.color = "inherit"; msgBox.style.display = "none"; }, 15000);
    }
});

document.getElementById("verifyBox").addEventListener("click", function() {
   this.focus();
});

async function convertTableToStandard() {
    const inputBox = document.getElementById('tableInput');
    const text = inputBox.value.trim();
    
    if (!text) {
        alert("请粘贴表格数据！");
        return;
    }
    
    // 按Tab分隔数据
    const fields = text.split('\t');
    
    // 根据实际表格格式解析
    // 未出租	qq1号	m68131	298m	青铜	0	60	6 (9格体验卡7天)	6	6	40	4	4	暗星 / 蚀金玫瑰 / 红狼-电锯惊魂	qq账密	38	797	350	1147	42	701	96	2026/3/2 12:11	19155182035
    
    if (fields.length < 20) {
        alert("数据格式不正确！请确保粘贴完整的表格行数据。");
        return;
    }
    
    const hafuCoin = fields[3] || '';
    const rank = fields[4] || '';
    const kd = fields[5] || '';
    const level = fields[6] || '';
    const insuranceRaw = fields[7] || '';
    const stamina = fields[8] || '';
    const weight = fields[9] || '';
    const awm = fields[10] || '';
    const head6 = fields[11] || '';
    const armor6 = fields[12] || '';
    const skins = fields[13] || '无';
    const loginMethod = fields[14] || '';
    const deposit = fields[17] || '';
    const recoveryRent = fields[20] || '';
    const phone = fields[23] || '';
    
    // 解析保险格数和体验卡
    let insurance = insuranceRaw;
    let experienceCard = '0';
    const insuranceMatch = insuranceRaw.match(/^(\d+)/);
    const cardMatch = insuranceRaw.match(/体验卡(\d+)/);
    if (insuranceMatch) {
        insurance = insuranceMatch[1];
    }
    if (cardMatch) {
        experienceCard = cardMatch[1];
    }
    
    // 解析皮肤信息
    let knifeSkin = '无';
    let redSkin = '';
    let goldSkin = '';
    let weaponSkin = '无';
    
    if (skins && skins !== '无') {
        const skinParts = skins.split(' / ');
        skinParts.forEach(part => {
            part = part.trim();
            if (part.includes('天际线')) {
                redSkin = part;
            } else if (part.includes('红狼') || part.includes('露娜') || part.includes('金牌')) {
                if (goldSkin) {
                    goldSkin += '、' + part;
                } else {
                    goldSkin = part;
                }
            } else if (part.includes('刀') || part.includes('匕首')) {
                knifeSkin = part;
            } else {
                // 其他可能是武器皮肤
                if (weaponSkin === '无') {
                    weaponSkin = part;
                } else {
                    weaponSkin += '、' + part;
                }
            }
        });
    }
    
    // 转换登录方式
    let loginText = 'VX扫码';
    if (loginMethod.includes('qq扫码')) {
        loginText = 'QQ扫码';
    } else if (loginMethod.includes('qq账密')) {
        loginText = 'QQ账号密码';
    } else if (loginMethod.includes('vx扫码')) {
        loginText = 'VX扫码';
    }
    
    // 生成标准格式
    let insuranceText = `保险格数: ${insurance}格`;
    if (experienceCard !== '0') {
        insuranceText += `\n9格保险体验卡: ${experienceCard}张`;
    }
    
    const standardFormat = `===== 米饭商行 - 三角洲租号信息 =====
上号方式: ${loginText}
段位: ${rank}
绝密KD: ${kd}
哈夫币纯币: ${hafuCoin.toUpperCase()}
等级: ${level}
${insuranceText}
体力: ${stamina}
负重: ${weight}
AWM子弹数量: ${awm}
6头数量: ${head6}
6甲数量: ${armor6}
刀皮: ${knifeSkin}
干员红皮: ${redSkin || '无'}
干员金皮: ${goldSkin || '无'}
武器皮肤: ${weaponSkin}
联系号码: ${phone}
押金: ${deposit}元
回收租金: ${recoveryRent}元
=========================`;
    
    // 显示预览
    document.getElementById('convertPreview').textContent = standardFormat;
    
    // 复制到剪贴板
    try {
        await navigator.clipboard.writeText(standardFormat);
        const statusDiv = document.getElementById('convertStatus');
        statusDiv.style.display = 'block';
        setTimeout(() => {
            statusDiv.style.display = 'none';
        }, 3000);
    } catch (err) {
        alert('复制失败，请手动复制预览内容');
    }
}

async function copyConvertResult() {
    const previewBox = document.getElementById('convertPreview');
    const text = previewBox.textContent;
    
    if (!text || text.trim() === '') {
        alert("没有可复制的内容！请先转换数据。");
        return;
    }
    
    try {
        await navigator.clipboard.writeText(text);
        const statusDiv = document.getElementById('convertStatus');
        statusDiv.textContent = '✅ 复制成功！';
        statusDiv.style.display = 'block';
        
        // 清空输入框
        document.getElementById('tableInput').value = '';
        
        setTimeout(() => {
            statusDiv.style.display = 'none';
            statusDiv.textContent = '✅ 转换成功！';
        }, 2000);
    } catch (err) {
        alert('复制失败，请手动复制预览内容');
    }
}

async function convertTableToSimple() {
    const inputBox = document.getElementById('tableInput');
    const text = inputBox.value.trim();
    
    if (!text) {
        alert("请粘贴表格数据！");
        return;
    }
    
    const fields = text.split('\t');
    
    if (fields.length < 20) {
        alert("数据格式不正确！请确保粘贴完整的表格行数据。");
        return;
    }
    
    const accountNum = fields[2] || '';
    const hafuCoin = fields[3] || '';
    const insuranceRaw = fields[7] || '';
    const stamina = fields[8] || '';
    const weight = fields[9] || '';
    const skins = fields[13] || '无';
    const playerRatio = fields[15] || '';
    const playerRent = fields[16] || '';
    
    const insuranceMatch = insuranceRaw.match(/^(\d+)/);
    const insurance = insuranceMatch ? insuranceMatch[1] : insuranceRaw;
    
    const coinNum = hafuCoin.replace(/[mM]/gi, '');
    
    let skinText = skins === '无' ? '无皮肤' : skins;
    
    const simpleFormat = `编号${accountNum}，${coinNum}m纯币${playerRatio}比例出，租金${playerRent}，${insurance}-${stamina}-${weight}，${skinText}，有人要私聊我`;
    
    document.getElementById('convertPreview').textContent = simpleFormat;
    
    try {
        await navigator.clipboard.writeText(simpleFormat);
        const statusDiv = document.getElementById('convertStatus');
        statusDiv.style.display = 'block';
        setTimeout(() => {
            statusDiv.style.display = 'none';
        }, 3000);
    } catch (err) {
        alert('复制失败，请手动复制预览内容');
    }
}
</script>
</body>
</html>
